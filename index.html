<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Museum</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #1a1510;
            --wall:        #2b2319;
            --gold:        #c9a84c;
            --gold-light:  #e8c97a;
            --frame:       #3d2f1a;
            --frame-inner: #0e0b07;
            --text-primary:#f0e6d3;
            --text-muted:  #9a8870;
            --caption-bg:  rgba(20,15,8,0.85);
        }

        html, body {
            height: 100%;
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: "Georgia", "Times New Roman", serif;
        }

        /* ── Header ───────────────────────────────────────────── */
        header {
            text-align: center;
            padding: 3.5rem 1rem 2rem;
            border-bottom: 1px solid var(--gold);
            background: linear-gradient(180deg, #0e0b07 0%, var(--bg) 100%);
        }

        header .museum-label {
            display: inline-block;
            letter-spacing: .35em;
            font-size: .7rem;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: .75rem;
        }

        header h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: .08em;
            color: var(--text-primary);
        }

        header p.subtitle {
            margin-top: .6rem;
            font-size: .9rem;
            font-style: italic;
            color: var(--text-muted);
        }

        /* ── Gallery grid ─────────────────────────────────────── */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
            gap: 3rem 2.5rem;
            justify-items: center;
        }

        /* ── Exhibit card ─────────────────────────────────────── */
        .exhibit {
            width: 100%;
            cursor: zoom-in;
            outline: none;
        }

        .exhibit-frame {
            position: relative;
            background: var(--frame);
            padding: 14px;
            box-shadow:
                0 0 0 1px #5a4220,
                0 0 0 3px #2a1f0e,
                0 0 0 4px #6b4f28,
                0 6px 30px rgba(0,0,0,.7),
                inset 0 0 12px rgba(0,0,0,.5);
            border-radius: 2px;
            transition: transform .3s ease, box-shadow .3s ease;
        }

        .exhibit:focus .exhibit-frame,
        .exhibit:hover .exhibit-frame {
            transform: translateY(-4px) scale(1.01);
            box-shadow:
                0 0 0 1px var(--gold),
                0 0 0 3px #2a1f0e,
                0 0 0 5px var(--gold-light),
                0 12px 40px rgba(0,0,0,.8),
                inset 0 0 12px rgba(0,0,0,.5);
        }

        .exhibit-frame img {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            background: var(--frame-inner);
        }

        /* Spotlight glow on hover */
        .exhibit-frame::after {
            content: "";
            position: absolute;
            inset: -30px;
            background: radial-gradient(ellipse at 50% 110%, rgba(201,168,76,.18) 0%, transparent 65%);
            pointer-events: none;
            opacity: 0;
            transition: opacity .4s;
        }

        .exhibit:hover .exhibit-frame::after,
        .exhibit:focus .exhibit-frame::after {
            opacity: 1;
        }

        /* ── Caption ──────────────────────────────────────────── */
        figcaption {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .2rem;
            margin-top: .9rem;
            text-align: center;
        }

        .exhibit-number {
            font-size: .65rem;
            letter-spacing: .2em;
            color: var(--gold);
            text-transform: uppercase;
        }

        .exhibit-title {
            font-size: .88rem;
            color: var(--text-primary);
            font-style: italic;
        }

        /* ── Divider ──────────────────────────────────────────── */
        .section-divider {
            text-align: center;
            margin-bottom: 2.5rem;
            color: var(--gold);
            letter-spacing: .4em;
            font-size: .65rem;
            text-transform: uppercase;
        }

        .section-divider::before,
        .section-divider::after {
            content: "─────";
            color: var(--gold);
            opacity: .5;
            margin: 0 .8rem;
        }

        /* ── Empty state ──────────────────────────────────────── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 1rem;
            color: var(--text-muted);
            line-height: 2;
        }

        .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }

        .empty-state code {
            background: var(--wall);
            color: var(--gold-light);
            padding: .15em .4em;
            border-radius: 3px;
            font-size: .9em;
        }

        /* ── Footer ───────────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #3a2f1e;
            font-size: .75rem;
            color: var(--text-muted);
            letter-spacing: .05em;
        }

        /* ── Lightbox ─────────────────────────────────────────── */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        #lightbox.open { display: flex; }

        #lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 0 60px rgba(201,168,76,.25);
            border: 1px solid var(--gold);
        }

        #lightbox-close {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--gold);
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }

        #lightbox-caption {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-primary);
            font-style: italic;
            font-size: .9rem;
            background: var(--caption-bg);
            padding: .4rem 1.2rem;
            border-radius: 2px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header>
        <span class="museum-label">Collection · 0 works</span>
        <h1>The Museum</h1>
        <p class="subtitle">A curated gallery of photographs</p>
    </header>

    <main>
        <p class="section-divider">Permanent Collection</p>
        <div class="gallery">
        <div class="empty-state">
            <span class="empty-icon">🖼️</span>
            <p>No photos found.</p>
            <p>Add images to the <code>photos/</code> folder and run <code>python generate.py</code> again.</p>
        </div>
        </div>
    </main>

    <footer>
        &copy; The Museum &nbsp;·&nbsp; All rights reserved
    </footer>

    <!-- Lightbox -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
        <button id="lightbox-close" aria-label="Close">&times;</button>
        <img id="lightbox-img" src="" alt="" />
        <div id="lightbox-caption"></div>
    </div>

    <script>
        const lightbox      = document.getElementById("lightbox");
        const lightboxImg   = document.getElementById("lightbox-img");
        const lightboxCap   = document.getElementById("lightbox-caption");
        const lightboxClose = document.getElementById("lightbox-close");

        function openLightbox(src, title) {
            lightboxImg.src = src;
            lightboxImg.alt = title;
            lightboxCap.textContent = title;
            lightbox.classList.add("open");
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            lightbox.classList.remove("open");
            lightboxImg.src = "";
            document.body.style.overflow = "";
        }

        document.querySelectorAll(".exhibit").forEach(el => {
            el.addEventListener("click", () => {
                const img   = el.querySelector("img");
                const title = el.querySelector(".exhibit-title").textContent;
                openLightbox(img.src, title);
            });
            el.addEventListener("keydown", e => {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    const img   = el.querySelector("img");
                    const title = el.querySelector(".exhibit-title").textContent;
                    openLightbox(img.src, title);
                }
            });
        });

        lightbox.addEventListener("click", e => {
            if (e.target === lightbox || e.target === lightboxImg) closeLightbox();
        });
        lightboxClose.addEventListener("click", closeLightbox);

        document.addEventListener("keydown", e => {
            if (e.key === "Escape") closeLightbox();
        });
    </script>
</body>
</html>
